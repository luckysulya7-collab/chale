<!DOCTYPE html>
<html>

<head>

    <style>
        body {
            text-align: center;

            background-color: pink;

        h1 {
            color: red;
        }

        button {
            padding: 10px 20px;

</head>

<body>

    <button id="yes" onclick="yesClicked()">Yes 💖</button>
    <button id="no" onmouseover="moveButton()">No 😜</button>

    <script>
        function yesClicked() {
            alert("gandiye land!");
        }

        function moveButton() {
            var x = Math.random() * window.innerWidth;
